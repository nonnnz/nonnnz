name: Waka Readme

on:
  schedule:
    # รันทุกวันเวลา 02:00 UTC (09:00 น. เวลาไทย) ตั้งแต่วันจันทร์-ศุกร์
    - cron: "0 2 * * 1-5"
  workflow_dispatch: # เปิดให้กดรันเองได้ด้วยมือ

jobs:
  update-readme:
    name: Waka - Readme
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@v0.3.1
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_TITLE: true
          TIME_RANGE: last_7_days
          LANG_COUNT: 10
          SHOW_TOTAL: true
          # ตั้งค่า Flag เพื่อแสดงส่วนต่างๆ
          SHOW_COMMIT: "True"
          SHOW_DAYS_OF_WEEK: "True"
          SHOW_LANGUAGE: "True"
          SHOW_OS: "True"
          SHOW_PROJECTS: "True"
          SHOW_EDITORS: "True"
          SHOW_SHORT_INFO: "True"
          # เลือก Style ของแท่งกราฟ (1, 2, หรือ 3)
          SYMBOL_VERSION: "1" 
          # เลือกภาษาของหัวข้อ
          LOCALE: "en"
